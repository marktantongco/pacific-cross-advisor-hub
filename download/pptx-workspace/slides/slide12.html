<!DOCTYPE html>
<html>
<head>
<style>
html { background: #F4F1E9; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  background: #F4F1E9;
}
.top-bar { width: 720pt; height: 5pt; background: #15857A; }
.content { margin: 24pt 50pt 16pt 50pt; display: flex; flex-direction: column; }
.accent-line { width: 50pt; height: 4pt; background: #FF6A3B; border-radius: 2pt; margin-bottom: 6pt; }
.stats-row { display: flex; gap: 12pt; margin-top: 10pt; }
.stat-pill {
  flex: 1; background: #15857A; border-radius: 6pt; padding: 10pt 12pt;
  text-align: center;
}
.callouts { display: flex; gap: 12pt; margin-top: 12pt; }
.callout {
  flex: 1; background: #FFFFFF; border-radius: 6pt; padding: 14pt 14pt;
  border-left: 4pt solid #FF6A3B;
  box-shadow: 1px 1px 6px rgba(0,0,0,0.08);
}
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="content">
  <div class="accent-line"></div>
  <h1 style="color: #15857A; font-size: 24pt; font-family: Impact, sans-serif; margin: 0 0 2pt 0;">THE OFW GOLDMINE</h1>
  <p style="color: #888; font-size: 9pt; margin: 0;">A MASSIVE UNTAPPED MARKET</p>

  <div class="stats-row">
    <div class="stat-pill">
      <p style="color: #FF6A3B; font-size: 22pt; font-family: Impact, sans-serif; margin: 0;">2.2M</p>
      <p style="color: #FFFFFF; font-size: 8pt; margin: 2pt 0 0 0;">OFWs Worldwide</p>
    </div>
    <div class="stat-pill">
      <p style="color: #FF6A3B; font-size: 22pt; font-family: Impact, sans-serif; margin: 0;">$36B</p>
      <p style="color: #FFFFFF; font-size: 8pt; margin: 2pt 0 0 0;">Annual Remittances</p>
    </div>
    <div class="stat-pill">
      <p style="color: #FF6A3B; font-size: 22pt; font-family: Impact, sans-serif; margin: 0;">HIGH</p>
      <p style="color: #FFFFFF; font-size: 8pt; margin: 2pt 0 0 0;">Health Risks Abroad</p>
    </div>
  </div>

  <div class="callouts">
    <div class="callout">
      <p style="color: #2D2D2D; font-size: 10pt; margin: 0;">OFWs send money home but don't protect themselves</p>
    </div>
    <div class="callout">
      <p style="color: #2D2D2D; font-size: 10pt; margin: 0;">Blue Royale covers them worldwide with full flexibility</p>
    </div>
    <div class="callout">
      <p style="color: #2D2D2D; font-size: 10pt; margin: 0;">FlexiShield protects the family they leave behind</p>
    </div>
  </div>
</div>
</body>
</html>
