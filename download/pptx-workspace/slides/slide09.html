<!DOCTYPE html>
<html>
<head>
<style>
html { background: #F4F1E9; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  background: #F4F1E9;
}
.top-bar { width: 720pt; height: 5pt; background: #FF6A3B; }
.content { margin: 28pt 50pt 20pt 50pt; display: flex; flex-direction: column; }
.accent-line { width: 50pt; height: 4pt; background: #15857A; border-radius: 2pt; margin-bottom: 8pt; }
.numbers-row { display: flex; gap: 12pt; margin-top: 16pt; }
.num-card {
  flex: 1; background: #FFFFFF; border-radius: 6pt; padding: 18pt 10pt;
  text-align: center;
  border-bottom: 4pt solid #FF6A3B;
  box-shadow: 1px 1px 6px rgba(0,0,0,0.08);
}
.num-card.alt { border-bottom-color: #15857A; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="content">
  <div class="accent-line"></div>
  <h1 style="color: #FF6A3B; font-size: 24pt; font-family: Impact, sans-serif; margin: 0 0 2pt 0;">FLEXISHIELD: AFFORDABLE PROTECTION</h1>
  <p style="color: #888; font-size: 9pt; margin: 0;">KEY METRICS AT A GLANCE</p>

  <div class="numbers-row">
    <div class="num-card">
      <p style="color: #FF6A3B; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">PHP 2M</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Maximum coverage</p>
    </div>
    <div class="num-card alt">
      <p style="color: #15857A; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">PHP 1K</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Daily hospital income</p>
    </div>
    <div class="num-card">
      <p style="color: #FF6A3B; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">0-70</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Age range eligibility</p>
    </div>
  </div>

  <div class="numbers-row" style="margin-top: 12pt;">
    <div class="num-card alt">
      <p style="color: #15857A; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">2</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Claim methods: no-cash-outlay or reimbursement</p>
    </div>
    <div class="num-card">
      <p style="color: #FF6A3B; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">LOW</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Very affordable premiums</p>
    </div>
    <div class="num-card alt">
      <p style="color: #15857A; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">YES</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">COVID-19 coverage included</p>
    </div>
  </div>
</div>
</body>
</html>
