<!DOCTYPE html>
<html>
<head>
<style>
html { background: #F4F1E9; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  background: #F4F1E9;
}
.top-bar { width: 720pt; height: 5pt; background: #15857A; }
.content { margin: 24pt 50pt 16pt 50pt; display: flex; flex-direction: column; }
.accent-line { width: 50pt; height: 4pt; background: #FF6A3B; border-radius: 2pt; margin-bottom: 6pt; }
.stats-row { display: flex; gap: 12pt; margin-top: 10pt; }
.stat-card {
  flex: 1; background: #FFFFFF; border-radius: 6pt;
  padding: 12pt 14pt; display: flex; flex-direction: column; justify-content: center;
  border-left: 4pt solid #15857A;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.06);
}
.stat-card.accent { border-left-color: #FF6A3B; }
.note-box { margin-top: 8pt; padding: 6pt 12pt; background: #FFFFFF; border-radius: 4pt; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="content">
  <div class="accent-line"></div>
  <h1 style="color: #15857A; font-size: 22pt; font-family: Impact, sans-serif; margin: 0 0 2pt 0;">THE PHILIPPINE INSURANCE REALITY</h1>
  <p style="color: #888; font-size: 8pt; margin: 0;">KEY INDICATORS 2025</p>

  <div class="stats-row">
    <div class="stat-card">
      <p style="color: #15857A; font-size: 28pt; font-family: Impact, sans-serif; margin: 0;">1.79%</p>
      <p style="color: #2D2D2D; font-size: 9pt; margin: 3pt 0 0 0;">Insurance Penetration Rate</p>
    </div>
    <div class="stat-card accent">
      <p style="color: #FF6A3B; font-size: 28pt; font-family: Impact, sans-serif; margin: 0;">&#8369;4,414</p>
      <p style="color: #2D2D2D; font-size: 9pt; margin: 3pt 0 0 0;">Insurance Per Capita Spending</p>
    </div>
  </div>

  <div class="stats-row" style="margin-top: 10pt;">
    <div class="stat-card accent">
      <p style="color: #FF6A3B; font-size: 28pt; font-family: Impact, sans-serif; margin: 0;">70%</p>
      <p style="color: #2D2D2D; font-size: 9pt; margin: 3pt 0 0 0;">Filipinos Without Private Health Insurance</p>
    </div>
    <div class="stat-card">
      <p style="color: #15857A; font-size: 28pt; font-family: Impact, sans-serif; margin: 0;">10-12%</p>
      <p style="color: #2D2D2D; font-size: 9pt; margin: 3pt 0 0 0;">Annual Medical Inflation Rate</p>
    </div>
  </div>

  <div class="note-box">
    <p style="color: #666; font-size: 8pt; margin: 0;">Compare: Singapore 6.2% | Malaysia 4.8% | Thailand 4.5%</p>
  </div>
</div>
</body>
</html>
