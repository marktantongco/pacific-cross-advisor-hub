<!DOCTYPE html>
<html>
<head>
<style>
html { background: #F4F1E9; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  background: #F4F1E9;
}
.top-bar { width: 720pt; height: 5pt; background: #15857A; }
.content { margin: 28pt 50pt 20pt 50pt; display: flex; flex-direction: column; }
.accent-line { width: 50pt; height: 4pt; background: #FF6A3B; border-radius: 2pt; margin-bottom: 8pt; }
.numbers-row { display: flex; gap: 12pt; margin-top: 16pt; }
.num-card {
  flex: 1; background: #FFFFFF; border-radius: 6pt; padding: 18pt 10pt;
  text-align: center;
  border-bottom: 4pt solid #15857A;
  box-shadow: 1px 1px 6px rgba(0,0,0,0.08);
}
.num-card.alt { border-bottom-color: #FF6A3B; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="content">
  <div class="accent-line"></div>
  <h1 style="color: #15857A; font-size: 24pt; font-family: Impact, sans-serif; margin: 0 0 2pt 0;">BLUE ROYALE: BY THE NUMBERS</h1>
  <p style="color: #888; font-size: 9pt; margin: 0;">KEY METRICS AT A GLANCE</p>

  <div class="numbers-row">
    <div class="num-card">
      <p style="color: #15857A; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">USD 2M</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Maximum annual coverage</p>
    </div>
    <div class="num-card alt">
      <p style="color: #FF6A3B; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">100</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Years old? Still covered</p>
    </div>
    <div class="num-card">
      <p style="color: #15857A; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">195+</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Countries with emergency assistance</p>
    </div>
  </div>

  <div class="numbers-row" style="margin-top: 12pt;">
    <div class="num-card alt">
      <p style="color: #FF6A3B; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">2</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Ways to claim: reimbursement or no-cash-outlay</p>
    </div>
    <div class="num-card">
      <p style="color: #15857A; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">0</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Restrictions on hospital choice</p>
    </div>
    <div class="num-card alt">
      <p style="color: #FF6A3B; font-size: 30pt; font-family: Impact, sans-serif; margin: 0;">24/7</p>
      <p style="color: #666; font-size: 9pt; margin: 6pt 0 0 0;">Worldwide emergency support</p>
    </div>
  </div>
</div>
</body>
</html>
