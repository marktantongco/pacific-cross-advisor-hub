<!DOCTYPE html>
<html>
<head>
<style>
html { background: #1A1A1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  background: #1A1A1A;
}
.top-bar { width: 720pt; height: 6pt; background: #FFD700; }
.content { margin: 18pt 36pt 14pt 36pt; display: flex; flex-direction: column; flex: 1; }
.subtitle-bar { background: #FFD700; border-radius: 4pt; padding: 3pt 12pt; display: inline-block; margin-bottom: 6pt; }
.table-area { flex: 1; margin-top: 6pt; }
.note-bar { background: #4CAF50; border-radius: 6pt; padding: 6pt 14pt; margin-top: 6pt; text-align: center; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="content">
  <div class="subtitle-bar">
    <p style="color: #1A1A1A; font-size: 8pt; margin: 0; font-weight: bold;">BLUE ROYALE</p>
  </div>
  <h1 style="color: #FFD700; font-size: 22pt; margin: 0 0 2pt 0; font-weight: bold;">SAVE MORE ON BLUE ROYALE</h1>
  <p style="color: #AAAAAA; font-size: 9pt; margin: 0;">Deductible discounts reduce your premium</p>
  <div class="table-area">
    <div id="discount-table" class="placeholder" style="width: 648pt; height: 265pt;"></div>
  </div>
  <div class="note-bar">
    <p style="color: #FFFFFF; font-size: 9pt; margin: 0; font-weight: bold;">Higher deductible = Lower premium. Choose what fits your budget!</p>
  </div>
</div>
</body>
</html>
